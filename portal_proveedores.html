<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal de Proveedores — SST</title>
  <link rel="stylesheet" href="css/global.css?v=2">
  <link rel="stylesheet" href="css/portal.css">
</head>
<body>

  <!-- LOADING OVERLAY -->
  <div class="overlay-loading" id="overlayLoading">
    <div class="spinner"></div>
  </div>

  <!-- TOPBAR -->
  <nav class="topbar">
    <div class="topbar-brand">
      <span class="dot"></span>
      Portal SST
    </div>
    <button class="topbar-back" onclick="window.location.href='index'">
      ← Volver al inicio
    </button>
  </nav>

  <!-- PAGE HEADER -->
  <header class="page-header">
    <h1>📝 Portal de Carga de Documentos</h1>
    <p>Sube los documentos de Seguridad y Salud en el Trabajo</p>
  </header>

  <!-- FORM -->
  <div class="form-outer">
    <form id="formPrincipal" onsubmit="return false;">

      <!-- SECCIÓN 1: DATOS DEL PROVEEDOR -->
      <div class="form-card">
        <div class="form-card-head">
          <div class="head-icon">👤</div>
          <h2>Información del Proveedor</h2>
        </div>
        <div class="form-card-body">
          <div class="grid-2">
            <div class="field">
              <label>Nombre del Proveedor <span class="req">*</span></label>
              <input type="text" id="fProveedor" class="input" placeholder="Ej: Servicios Técnicos XYZ" required>
            </div>
            <div class="field">
              <label>Nombre Responsable <span class="req">*</span></label>
              <input type="text" id="fResponsable" class="input" placeholder="Tu nombre completo" required>
            </div>
            <div class="field">
              <label>Número de Documento <span class="req">*</span></label>
              <input type="text" id="fDocumento" class="input" placeholder="Número de cédula" required>
            </div>
            <div class="field">
              <label>Empresa <span class="req">*</span></label>
              <input type="text" id="fEmpresa" class="input" placeholder="Nombre de tu empresa" required>
            </div>
          </div>
        </div>
      </div>

      <!-- SECCIÓN 2: ÁREA -->
      <div class="form-card">
        <div class="form-card-head">
          <div class="head-icon">🏗️</div>
          <h2>Área de Trabajo</h2>
        </div>
        <div class="form-card-body">
          <div class="field">
            <label>Selecciona tu área <span class="req">*</span></label>
            <select id="areaSelect" class="select" onchange="cargarRequisitos()" required>
              <option value="">— Selecciona un área —</option>
            </select>
          </div>
        </div>
      </div>

      <!-- SECCIÓN 3: DOCUMENTOS REQUERIDOS -->
      <div id="requisitosWrap" style="display:none;">
        <div class="form-card">
          <div class="form-card-head">
            <div class="head-icon">📁</div>
            <h2>Documentos Requeridos</h2>
          </div>
          <div class="form-card-body">
            <div id="requisitosList"></div>
          </div>
        </div>
      </div>

      <!-- BARRA DE PROGRESO -->
      <div class="progress-wrap" id="progressWrap">
        <div class="progress-fill" id="progressFill"></div>
      </div>

      <!-- MENSAJE -->
      <div id="msgPortal" class="msg" style="margin: 1rem 0;"></div>

      <!-- BOTÓN ENVIAR -->
      <div id="submitWrap" style="display:none;" class="submit-area">
        <button
          type="button"
          id="btnEnviar"
          class="btn btn-primary btn-lg btn-full"
          onclick="enviarFormulario()">
          📤 Enviar Documentos
        </button>
      </div>

    </form>
  </div>

  <!-- SCRIPTS (orden: config → api → lógica) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/areas.js"></script>
  <script src="js/portal.js"></script>

</body>
</html>
